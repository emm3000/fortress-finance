name: Android QA to Firebase App Distribution

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/android-qa-firebase.yml'

permissions:
  contents: read

concurrency:
  group: android-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create google-services.json from secret
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "Missing GOOGLE_SERVICES_JSON_BASE64 secret"
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > google-services.json
          test -s google-services.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android QA APK (EAS)
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL_QA }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN_QA }}
        run: |
          eas build --platform android --profile qa --non-interactive --wait --json > eas-build.json
          cat eas-build.json

      - name: Resolve APK URL
        id: apk
        run: |
          APK_URL=$(node -e "const fs=require('fs');const d=JSON.parse(fs.readFileSync('eas-build.json','utf8'));const b=Array.isArray(d)?d[0]:d;console.log(b?.artifacts?.buildUrl || '')")
          if [ -z \"$APK_URL\" ]; then
            echo "Could not resolve build artifact URL from eas-build.json"
            exit 1
          fi
          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: |
          curl -L "${{ steps.apk.outputs.apk_url }}" -o app-qa.apk
          ls -lh app-qa.apk

      - name: Upload APK to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: qa-team
          file: frontend/app-qa.apk
          releaseNotes: |
            QA build from commit ${{ github.sha }}
            Branch: ${{ github.ref_name }}
